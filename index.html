<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shadow Protocol</title>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    position: relative;
}
canvas {
    background: #d9d9d9;
    z-index: 1;
}

/* ===== MENU ===== */
#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 5;
}
#menu h1 {
    color: white;
    font-size: 50px;
}
#menu button {
    padding: 15px 40px;
    font-size: 22px;
    margin-top: 20px;
    cursor: pointer;
}

/* ===== BUTTONS ===== */
#menuBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    display: none;
    z-index: 4;
}
#restartBtn {
    position: absolute;
    top: 60%;
    left: 50%;
    transform: translate(-50%,-50%);
    padding: 20px 40px;
    font-size: 24px;
    background: red;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: none;
    z-index: 4;
}

/* ===== MOBILE CONTROLS ===== */
#mobileControls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 2;
}
.row {
    display: flex;
    justify-content: center;
    gap: 10px;
}
.button {
    width: 60px;
    height: 60px;
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 10px;
}
</style>
</head>

<body>

<canvas id="gameCanvas" width="900" height="500"></canvas>

<!-- MENU -->
<div id="menu">
    <h1>Shadow Protocol</h1>
    <button id="playBtn">Play</button>
</div>

<button id="menuBtn">Menu</button>
<button id="restartBtn">Restart</button>

<div id="mobileControls">
    <div class="row"><div class="button" data-key="w">W</div></div>
    <div class="row">
        <div class="button" data-key="a">A</div>
        <div class="button" data-key="s">S</div>
        <div class="button" data-key="d">D</div>
    </div>
    <div class="row"><div class="button" data-key=" ">SPACE</div></div>
</div>

<script src="game.js"></script>

</body>
</html>
