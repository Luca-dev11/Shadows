<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shadow Protocol</title>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CANVAS */
canvas {
    background: #d9d9d9;
}

/* MENU */
#menu {
    position: absolute;
    width: 300px;
    height: 200px;
    background: rgba(0,0,0,0.8);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    border-radius: 15px;
}

#menu button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
}

/* BUTTONS */
#shopBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 10px 15px;
    cursor: pointer;
}

#menuBtn {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 10px 15px;
    cursor: pointer;
    display: none;
}

#restartBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    padding: 20px 40px;
    font-size: 24px;
    background: red;
    color: white;
    border: none;
    border-radius: 10px;
    display: none;
    cursor: pointer;
}

/* MOBILE CONTROLS */
#mobileControls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.row {
    display: flex;
    gap: 10px;
    justify-content: center;
}

.button {
    width: 60px;
    height: 60px;
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
    <h2>Shadow Protocol</h2>
    <button id="playBtn">Play</button>
</div>

<!-- CANVAS -->
<canvas id="gameCanvas" width="900" height="500"></canvas>

<!-- BUTTONS -->
<button id="shopBtn">Shop</button>
<button id="menuBtn">Menu</button>
<button id="restartBtn">Restart</button>

<!-- MOBILE CONTROLS -->
<div id="mobileControls">
    <div class="row">
        <div class="button" data-key="w">W</div>
    </div>
    <div class="row">
        <div class="button" data-key="a">A</div>
        <div class="button" data-key="s">S</div>
        <div class="button" data-key="d">D</div>
    </div>
    <div class="row">
        <div class="button" data-key=" ">SPACE</div>
    </div>
</div>

<!-- SCRIPT -->
<script src="game.js"></script>

</body>
</html>
